# ============================================================================
# Mcaster1BackDraft — C++ Admin Daemon Configuration
# Version: 0.0.1a
# ============================================================================

app_name: "Mcaster1BackDraft"
version: "0.0.1a"
pid_file: "/var/www/mcaster1.com/Mcaster1BackDraft/logs/backdraft.pid"
daemon: false

log:
  level: DEBUG
  dir: "/var/www/mcaster1.com/Mcaster1BackDraft/logs"
  max_mb: 50
  keep: 5

auth:
  master_username: dstjohn
  master_password: "your_db_password_here"
  api_token: "bd9f4a2c8e1d7b3f6a0e5c9d2b8f4a1c7e3d0b6f9a2c5e8d1b4f7a0c3e6d9b"
  session_ttl_secs: 3600

http:
  bind_addr: "0.0.0.0"
  web_port: 8862
  api_port: 8832
  waf_port: 9432
  enable_https: true
  tls_cert: "/etc/ssl/mcaster1.com/mcaster1.com-fullchain.crt"
  tls_key: "/etc/ssl/mcaster1.com/mcaster1.key"
  web_root: "/var/www/mcaster1.com/Mcaster1BackDraft/web"
  fcgi_socket: "/run/php/php8.2-fpm-backdraft.sock"

smtp:
  host: smtp.gmail.com
  port: 587
  username: davestj@casterclub.com
  password: "hlgz kyuu mcnt gxhk"
  from_addr: davestj@casterclub.com
  from_name: "Mcaster1 BackDraft WAF"
  use_tls: true

databases:
  - name: backdraft
    host: 127.0.0.1
    port: 3306
    database: mcaster1_backdraft
    username: your_db_username_here
    password: "your_db_password_here"
    charset: utf8mb4
    pool_size: 8

nginx:
  sites_enabled: "/etc/nginx/sites-enabled"
  conf_d: "/etc/nginx/conf.d"
  backdraft_d: "/etc/nginx/backdraft.d"
  snippets: "/etc/nginx/snippets"
  nginx_bin: "/usr/sbin/nginx"
  sudo_reload: true

waf:
  mode: learning
  rule_reload_secs: 30
  threat_threshold: 75
  max_body_inspect: 65536
  log_all_requests: true
  upstream_fcgi: "/run/php/php8.2-fpm.sock"

perf:
  enabled: true
  interval_secs: 10
