[backdraft]
user  = mediacast1
group = www-data
listen = /run/php/php8.2-fpm-backdraft.sock
listen.owner = mediacast1
listen.group = www-data
listen.mode  = 0660

pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 5
pm.max_requests      = 0

php_admin_value[error_log]      = /var/www/mcaster1.com/Mcaster1BackDraft/logs/php_fpm.log
php_admin_flag[log_errors]      = on
php_admin_value[memory_limit]   = 256M
php_admin_value[expose_php]     = off
php_admin_value[display_errors] = Off
